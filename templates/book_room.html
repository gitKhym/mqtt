<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Book a Room</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f4f6f9;
      }

      .room-card {
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        background: white;
        padding: 20px;
        margin-bottom: 20px;
      }

      .room-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .status {
        font-weight: bold;
      }

      .status.Available {
        color: green;
      }

      .status.Occupied {
        color: yellow;
      }

      .status.Maintenance {
        color: orange;
      }

      .status.Fault {
        color: red;
      }

      .booking-form {
        margin-top: 15px;
      }
    </style>
  </head>

  <body>
    <div class="container mt-4" id="rooms-container"></div>

    <div class="text-center mt-4">
      <a href="{{ url_for('home') }}" class="btn btn-secondary">Back to Home</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/bookRoom.js') }}"></script>
  </body>
</html>
