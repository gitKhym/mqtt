<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book a Room</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    >
    <style>
        body {
            background-color: #f4f6f9;
        }
        .room-card {
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            background: white;
            padding: 20px;
            margin-bottom: 20px;
        }
        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status {
            font-weight: bold;
        }
        .status.Available { color: green; }
        .status.Occupied { color: yellow; }
        .status.Maintenance { color: orange; }
        .status.Fault { color: red; }
        .booking-form {
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="container mt-4">
    <h2 class="mb-4 text-center">Book a Room</h2>

    {% if rooms %}
        {% for room_id, room in rooms.items() %}
        <div class="room-card">
            <div class="room-header">
                <h5>{{ room.room_name }}</h5>
                <span class="status {{ room.status }}">{{ room.status }}</span>
            </div>

            <form class="booking-form" method="POST" action="{{ url_for('booking') }}">
                <input type="hidden" name="room_id" value="{{ room_id }}">
                <div class="row g-2">
                    <div class="col-md-6">
                        <label for="starttime_{{ room_id }}" class="form-label">Start Time</label>
                        <input type="datetime-local" id="starttime_{{ room_id }}" name="starttime" class="form-control" required>
                    </div>
                    <div class="col-md-4">
                        <label for="duration_{{ room_id }}" class="form-label">Duration (hours)</label>
                        <input type="number" id="duration_{{ room_id }}" name="duration" class="form-control" min="1" max="4" required>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        {% if room.status == "Available" %}
                            <button type="submit" class="btn btn-primary w-100">Book</button>
                        {% else %}
                            <button type="button" class="btn btn-secondary w-100" disabled>Unavailable</button>
                        {% endif %}
                    </div>
                </div>
            </form>
        </div>
        {% endfor %}
    {% else %}
        <div class="alert alert-info text-center">No rooms available at the moment.</div>
    {% endif %}

    <div class="text-center mt-4">
        <a href="{{ url_for('home') }}" class="btn btn-secondary">Back to Home</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
