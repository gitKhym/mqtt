<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Book a Room</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #f4f6f9;
    }

    .room-card {
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      background: white;
      padding: 20px;
      margin-bottom: 20px;
    }

    .room-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status {
      font-weight: bold;
    }

    .status.Available {
      color: green;
    }

    .status.Occupied {
      color: yellow;
    }

    .status.Maintenance {
      color: orange;
    }

    .status.Fault {
      color: red;
    }

    .booking-form {
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div class="container mt-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} mt-3" role="alert">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card shadow-sm mb-4 border-0">
      <div class="card-body">
        <h5 class="card-title fw-bold mb-3">Book a Room</h5>
        <form id="static-booking-form" method="POST" action="/booking">
          <div class="row g-3">
            <div class="col-md-4">
              <label for="room-select" class="form-label">Select Room</label>
              <select class="form-select" id="room-select" name="room_id" required>
                <option value="">Choose...</option>
                {% for room_id, room in rooms.items() %}
                  <option value="{{ room_id }}">{{ room.room_name }} ({{ room.location }})</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-4">
              <label for="starttime" class="form-label">Start Time</label>
              <input type="datetime-local" id="starttime" name="starttime" class="form-control" required>
            </div>
            <div class="col-md-2">
              <label for="duration" class="form-label">Duration (hours)</label>
              <input type="number" id="duration" name="duration" class="form-control" min="1" max="2" value="1" required>
            </div>
            <div class="col-md-2 d-flex align-items-end">
              <button type="submit" class="btn btn-primary w-100">Book Now</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <h2 class="mt-4 mb-3">Available Rooms</h2>
    <div id="rooms-container"></div>
  </div>
  <div class="text-center mt-4">
    <a href="{{ url_for('home') }}" class="btn btn-secondary">Back to Home</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/bookRoom.js') }}"></script>
</body>

</html>
