{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2 class="mt-4">Edit User</h2>

    <div class="card my-4">
        <div class="card-header">
            Edit User Details
        </div>
        <div class="card-body">
            <form action="{{ url_for('update_user', user_id=user.id) }}" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ user.full_name }}" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <select class="form-control" id="role" name="role">
                        <option value="user" {% if user.role == 'user' %}selected{% endif %}>User</option>
                        <option value="security" {% if user.role == 'security' %}selected{% endif %}>Security</option>
                        <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Update</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
